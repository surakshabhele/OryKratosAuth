services:
  kratos:
    image: oryd/kratos:v1.3.1
    ports:
      - "5443:4433"
      - "5444:4434"
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID in .env}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?set GOOGLE_CLIENT_SECRET in .env}
    volumes:
      - ./kratos/kratos.yml:/etc/config/kratos/kratos.yml:ro
      - ./kratos/identity.schema.json:/etc/config/kratos/identity.schema.json:ro
      - ./kratos/google.mapper.jsonnet:/etc/config/kratos/google.mapper.jsonnet:ro
      - ./kratos/start.sh:/etc/config/kratos/start.sh:ro
      - kratos-data:/var/lib/sqlite
    entrypoint: ["/bin/sh", "/etc/config/kratos/start.sh"]
    restart: unless-stopped
    depends_on:
      - mailslurper

  mailslurper:
    image: oryd/mailslurper:latest-smtps
    ports:
      - "5446:4436"
      - "5447:4437"
    restart: unless-stopped

volumes:
  kratos-data:
