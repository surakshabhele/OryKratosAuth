serve:
  public:
    base_url: http://127.0.0.1:4433

cors:
  enabled: true
  allowed_origins:
    - http://127.0.0.1:3000
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
  allowed_headers:
    - Authorization
    - Content-Type
    - Cookie
    - X-CSRF-Token
  exposed_headers:
    - Content-Type
    - Set-Cookie
  allow_credentials: true

selfservice:
  default_browser_return_url: http://127.0.0.1:3000/login
  flows:
    login:
      ui_url: http://127.0.0.1:3000/login
    registration:
      ui_url: http://127.0.0.1:3000/register
      after:
        oidc:
          hooks:
            - hook: session
  methods:
    password:
      enabled: true
    oidc:
      enabled: true
      config:
        providers:
          - id: google
            provider: google
            client_id: YOUR_GOOGLE_CLIENT_ID
            client_secret: YOUR_GOOGLE_CLIENT_SECRET
            issuer_url: https://accounts.google.com
            mapper_url: file:///etc/config/kratos/google.mapper.jsonnet
            scope:
              - openid
              - email
              - profile
            requested_claims:
              id_token:
                email:
                  essential: true
                email_verified:
                  essential: true
                given_name:
                  essential: true
                family_name: null

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json
